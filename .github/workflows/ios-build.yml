name: iOS Build

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build unsigned iOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app

      - name: Archive without signing
        run: |
          xcodebuild archive \
            -project Sphere.xcodeproj \
            -scheme Sphere \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath build/Sphere.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Create unsigned IPA
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION_NAME="${GITHUB_REF#refs/tags/}"
          else
            VERSION_NAME="${SHORT_SHA}"
          fi

          IPA_NAME="sphere-${VERSION_NAME}.ipa"

          mkdir -p build/Payload
          cp -a build/Sphere.xcarchive/Products/Applications/Sphere.app build/Payload/
          find build/Payload/Sphere.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \; || true
          cd build
          zip -r9 "$IPA_NAME" Payload

          echo "IPA_PATH=build/${IPA_NAME}" >> "$GITHUB_ENV"
          echo "IPA_NAME=${IPA_NAME}" >> "$GITHUB_ENV"

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.IPA_NAME }}
          path: ${{ env.IPA_PATH }}
          if-no-files-found: error

      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ env.IPA_PATH }}
          generate_release_notes: true

  build-pages:
    name: Build AltStore source JSON
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate AltStore source from GitHub Releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p site/altstore tmp/json
          gh api "repos/${GITHUB_REPOSITORY}/releases?per_page=100" > tmp/json/releases.json
          jq -c \
            '
            sort_by(.published_at // .created_at)
            | reverse
            | map(select(.draft | not))
            | map(select(.prerelease | not))
            | map(
                . as $release
                | ($release.assets | map(select(.name | test("^sphere-.*\\.ipa$"))) | first) as $asset
                | select($asset != null)
                | {
                    version: ($release.tag_name | sub("^v"; "")),
                    date: ($release.published_at // $release.created_at),
                    localizedDescription: (
                      if (($release.body // "") | length) > 0
                      then ($release.body | gsub("\\*\\*"; ""))
                      elif (($release.name // "") | length) > 0
                      then ($release.name | gsub("\\*\\*"; ""))
                      else "Release \($release.tag_name)"
                      end
                    ),
                    downloadURL: $asset.browser_download_url,
                    size: $asset.size,
                    buildVersion: "1",
                    minOSVersion: "18.6"
                  }
              )
            | .[:50]
            ' tmp/json/releases.json > tmp/json/versions.json

          if [ "$(jq 'length' tmp/json/versions.json)" -eq 0 ]; then
            echo "No matching IPA release assets found."
            exit 1
          fi

          jq -n \
            --slurpfile versions tmp/json/versions.json \
            --arg sourceName "Sphere Source" \
            --arg sourceSubtitle "A proxy controller client." \
            --arg sourceDescription "" \
            --arg sourceIconURL "https://github.com/user-attachments/assets/86577a94-7e6f-4b31-b18e-f7a7271c4ad7" \
            --arg website "https://github.com/${GITHUB_REPOSITORY}/" \
            --arg tintColor "#16A34A" \
            --arg appName "Sphere" \
            --arg bundleIdentifier "dev.gholts.Sphere" \
            --arg developerName "Hugo Lee" \
            --arg appSubtitle "Proxy controller client" \
            --arg appDescription "Sphere is an iOS app for managing LAN controller profiles." \
            --arg appIconURL "https://github.com/user-attachments/assets/86577a94-7e6f-4b31-b18e-f7a7271c4ad7" \
            --arg category "utilities" \
            '
            {
              name: $sourceName,
              subtitle: $sourceSubtitle,
              description: $sourceDescription,
              iconURL: $sourceIconURL,
              website: $website,
              tintColor: $tintColor,
              featuredApps: [
                $bundleIdentifier
              ],
              apps: [
                {
                  name: $appName,
                  bundleIdentifier: $bundleIdentifier,
                  developerName: $developerName,
                  subtitle: $appSubtitle,
                  localizedDescription: $appDescription,
                  iconURL: $appIconURL,
                  tintColor: $tintColor,
                  category: $category,
                  screenshots: [],
                  versions: $versions[0],
                  appPermissions: {
                    entitlements: [],
                    privacy: {
                      NSLocalNetworkUsageDescription: "Sphere connects to LAN controllers on your local network."
                    }
                  }
                }
              ]
            }
            ' > site/altstore/release.json

          jq . site/altstore/release.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy-pages:
    name: Deploy AltStore source
    needs: build-pages
    if: needs.build-pages.result == 'success'
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
